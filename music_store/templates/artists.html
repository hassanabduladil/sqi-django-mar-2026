{% extends 'base.html' %}

{% block content %}

<section class="page-header">

<h1>Artists</h1>
<p>Explore the musicians shaping the sound of generations.</p>

</section>

<div class="artist-grid">

{% for artist in artists %}

<div class="artist-card">

<div class="artist-image">

<img src="{{ artist.image.url }}" alt="{{ artist.name }}">

</div>

<div class="artist-info">

<h3>{{ artist.name }}</h3>

<p class="artist-year">
Debut: {{ artist.debut_year }}
</p>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
